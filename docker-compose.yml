version: "3"

services:
  app:
    build:
      context: .
    network_mode: "bridge"
    ports:
      - '5005:5005'
    expose:
      - "9094"
      - "9095"
    env_file:
      - .env
    depends_on:
      - 'postgres'

  postgres:
    container_name: postgres_container
    image: postgres
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
    volumes:
      - ./src/main/resources/db/changelog/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"