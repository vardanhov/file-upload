version: "3.5"

services:
  app:
    build:
      context: .
    ports:
      - '8888:8888'
    networks:
      - default
    expose:
      - '5432'
    env_file:
      - .env
    depends_on:
      - 'postgres'

  postgres:
    container_name: postgres_container
    image: postgres
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    networks:
      - default

networks:
  default:
    name: localhost